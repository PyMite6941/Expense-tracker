name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Fails fast with a clear message if the secret is missing rather than
      # surfacing the confusing "specify exactly one of..." auth error.
      - name: Verify secrets are set
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          missing=()
          [ -z "$GCP_SA_KEY" ]     && missing+=("GCP_SA_KEY")
          [ -z "$GCP_PROJECT_ID" ] && missing+=("GCP_PROJECT_ID")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secret(s): ${missing[*]}"
            echo "Go to Settings → Secrets and variables → Actions and add them."
            exit 1
          fi

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          cd backend
          gcloud run deploy expense-backend \
            --source . \
            --region us-central1 \
            --allow-unauthenticated \
            --project ${{ secrets.GCP_PROJECT_ID }}
